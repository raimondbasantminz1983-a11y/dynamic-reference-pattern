<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dynamic Reference Pattern</title>

  <style>
    body{
      background:#000;
      color:white;
      font-family:sans-serif;
      margin:0;
      padding:20px;
    }

    h1{
      text-align:center;
    }

    .container{
      display:grid;
      grid-template-columns:1fr;
      gap:20px;
    }

    @media(min-width:900px){
      .container{
        grid-template-columns:1fr 1fr 1fr;
      }
    }

    .box{
      background:#111;
      border:1px solid #333;
      border-radius:20px;
      padding:15px;
    }

    textarea,input{
      width:100%;
      padding:10px;
      margin-top:10px;
      background:#222;
      color:white;
      border:none;
      border-radius:10px;
    }

    button{
      width:100%;
      padding:10px;
      margin-top:10px;
      border:none;
      border-radius:10px;
      font-weight:bold;
      cursor:pointer;
    }

    .white{
      background:white;
      color:black;
    }

    .item{
      background:#222;
      padding:10px;
      border-radius:10px;
      margin-top:10px;
    }

  </style>
</head>

<body>

<h1>Dynamic Reference Pattern</h1>

<div class="container">

  <div class="box">
    <h2>A — Full Story</h2>

    <textarea id="storyInput" placeholder="Write full story..."></textarea>

    <button class="white" onclick="addStory()">
      Add Story
    </button>

    <div id="storyList"></div>
  </div>

  <div class="box">
    <h2>B — Match Points</h2>

    <input id="pointInput" placeholder="Write point..." />

    <button class="white" onclick="addPoint()">
      Add Point
    </button>

    <div id="pointList"></div>
  </div>

  <div class="box">
    <h2>C — New Ideas</h2>

    <input id="ideaInput" placeholder="Write new idea..." />

    <button class="white" onclick="addIdea()">
      Add Idea
    </button>

    <div id="ideaList"></div>
  </div>

</div>

<script>

let stories =
JSON.parse(localStorage.getItem("stories")) || [];

let points =
JSON.parse(localStorage.getItem("points")) || [];

let ideas =
JSON.parse(localStorage.getItem("ideas")) || [];

function saveData(){

  localStorage.setItem(
    "stories",
    JSON.stringify(stories)
  );

  localStorage.setItem(
    "points",
    JSON.stringify(points)
  );

  localStorage.setItem(
    "ideas",
    JSON.stringify(ideas)
  );
}

function highlightMatches(text){

  let result = text;

  points.forEach((p)=>{

    const word = p.text;

    if(!word) return;

    const regex =
    new RegExp(word,"gi");

    result =
    result.replace(
      regex,
      `<mark style="
      background:lime;
      color:black;
      padding:2px;
      border-radius:4px;
      ">
      ${word}
      </mark>`
    );

  });

  return result;
}

function addStory(){

  const input =
  document.getElementById("storyInput");

  if(!input.value.trim()) return;

  stories.push(input.value);

  saveData();

  renderStories();

  input.value = "";
}

function addPoint(){

  const input =
  document.getElementById("pointInput");

  if(!input.value.trim()) return;

  const match =
  stories.some(s =>
    s.toLowerCase()
    .includes(input.value.toLowerCase())
  );

  points.push({
    text: input.value,
    type: match ? "MATCH" : "MISMATCH"
  });

  saveData();

  renderPoints();

  renderStories();

  input.value = "";
}

function addIdea(){

  const input =
  document.getElementById("ideaInput");

  if(!input.value.trim()) return;

  ideas.push(input.value);

  saveData();

  renderIdeas();

  input.value = "";
}

function moveIdeaToStory(index){

  stories.push(ideas[index]);

  ideas.splice(index,1);

  saveData();

  renderStories();

  renderIdeas();
}

function moveIdeaToPoints(index){

  const text = ideas[index];

  const match =
  stories.some(s =>
    s.toLowerCase()
    .includes(text.toLowerCase())
  );

  points.push({
    text,
    type: match ? "MATCH" : "MISMATCH"
  });

  ideas.splice(index,1);

  saveData();

  renderPoints();

  renderStories();

  renderIdeas();
}

function deleteStory(index){

  stories.splice(index,1);

  saveData();

  renderStories();
}

function deletePoint(index){

  points.splice(index,1);

  saveData();

  renderPoints();

  renderStories();
}

function deleteIdea(index){

  ideas.splice(index,1);

  saveData();

  renderIdeas();
}

function renderStories(){

  const list =
  document.getElementById("storyList");

  list.innerHTML = "";

  stories.forEach((s,index)=>{

    list.innerHTML += `
      <div class="item">

        <div>
        ${highlightMatches(s)}
        </div>

        <button
        onclick="deleteStory(${index})"
        style="
        margin-top:10px;
        background:red;
        color:white;">
        Delete
        </button>

      </div>
    `;
  });
}

function renderPoints(){

  const list =
  document.getElementById("pointList");

  list.innerHTML = "";

  points.forEach((p,index)=>{

    list.innerHTML += `
      <div class="item">

        ${p.text}

        <br><br>

        <b style="
        color:
        ${p.type==="MATCH"
          ?"lime"
          :"orange"}">

        ${p.type}

        </b>

        <button
        onclick="deletePoint(${index})"
        style="
        margin-top:10px;
        background:red;
        color:white;">
        Delete
        </button>

      </div>
    `;
  });
}

function renderIdeas(){

  const list =
  document.getElementById("ideaList");

  list.innerHTML = "";

  ideas.forEach((i,index)=>{

    list.innerHTML += `
      <div class="item">

        ${i}

        <button
        onclick="moveIdeaToStory(${index})"
        style="
        margin-top:10px;
        background:blue;
        color:white;">
        Send To A
        </button>

        <button
        onclick="moveIdeaToPoints(${index})"
        style="
        margin-top:10px;
        background:green;
        color:white;">
        Send To B
        </button>

        <button
        onclick="deleteIdea(${index})"
        style="
        margin-top:10px;
        background:red;
        color:white;">
        Delete
        </button>

      </div>
    `;
  });
}

renderStories();

renderPoints();

renderIdeas();

</script>

</body>
</html>
