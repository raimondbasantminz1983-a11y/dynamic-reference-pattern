<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<title>Dynamic Reference Pattern</title>

<style>

body{
background:#000;
color:white;
font-family:sans-serif;
margin:0;
padding:20px;
}

h1{
text-align:center;
margin-bottom:20px;
}

.topbar{
margin-bottom:20px;
}

.container{
display:grid;
grid-template-columns:1fr;
gap:20px;
}

@media(min-width:900px){
.container{
grid-template-columns:1fr 1fr 1fr;
}
}

.box{
background:#111;
border:1px solid #333;
border-radius:20px;
padding:15px;
}

textarea,
input{
width:100%;
padding:12px;
margin-top:10px;
background:#222;
color:white;
border:none;
border-radius:10px;
box-sizing:border-box;
}

textarea{
min-height:120px;
resize:vertical;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
font-size:15px;
}

.white{
background:white;
color:black;
}

.blue{
background:#0066ff;
color:white;
}

.green{
background:#00aa44;
color:white;
}

.red{
background:red;
color:white;
}

.item{
background:#222;
padding:12px;
border-radius:10px;
margin-top:10px;
word-wrap:break-word;
}

.status-match{
color:lime;
font-weight:bold;
}

.status-mismatch{
color:orange;
font-weight:bold;
}

#saveStatus{
position:fixed;
top:10px;
right:10px;
background:lime;
color:black;
padding:10px 15px;
border-radius:10px;
display:none;
font-weight:bold;
z-index:999;
}

</style>
</head>

<body>

<div id="saveStatus">
Saved ✓
</div>

<h1>Dynamic Reference Pattern</h1>

<div class="topbar">

<input
id="searchInput"
placeholder="Search everything..."
onkeyup="searchAll()"
/>

<button
class="white"
onclick="exportTXT()">
Export TXT
</button>

<button
class="white"
onclick="exportJSON()">
Export JSON
</button>

</div>

<div class="container">

<div class="box">

<h2>A — Full Story</h2>

<textarea
id="storyInput"
placeholder="Write full story..."
></textarea>

<button
class="blue"
onclick="startVoice('storyInput')">
🎤 Voice Story
</button>

<button
class="white"
onclick="addStory()">
Add Story
</button>

<div id="storyList"></div>

</div>

<div class="box">

<h2>B — Match Points</h2>

<input
id="pointInput"
placeholder="Write point..."
/>

<button
class="blue"
onclick="startVoice('pointInput')">
🎤 Voice Point
</button>

<button
class="white"
onclick="addPoint()">
Add Point
</button>

<div id="pointList"></div>

</div>

<div class="box">

<h2>C — New Ideas</h2>

<input
id="ideaInput"
placeholder="Write new idea..."
/>

<button
class="blue"
onclick="startVoice('ideaInput')">
🎤 Voice Idea
</button>

<button
class="white"
onclick="addIdea()">
Add Idea
</button>

<div id="ideaList"></div>

</div>

</div>

<script>

let stories =
JSON.parse(
localStorage.getItem("stories")
) || [];

let points =
JSON.parse(
localStorage.getItem("points")
) || [];

let ideas =
JSON.parse(
localStorage.getItem("ideas")
) || [];

function saveData(){

localStorage.setItem(
"stories",
JSON.stringify(stories)
);

localStorage.setItem(
"points",
JSON.stringify(points)
);

localStorage.setItem(
"ideas",
JSON.stringify(ideas)
);

showSaveStatus();
}

function showSaveStatus(){

const box =
document.getElementById(
"saveStatus"
);

box.style.display = "block";

setTimeout(()=>{

box.style.display = "none";

},1200);

}

function highlightMatches(text){

let result = text;

points.forEach((p)=>{

const word = p.text;

if(!word) return;

const regex =
new RegExp(word,"gi");

result =
result.replace(
regex,

`<mark style="
background:lime;
color:black;
padding:2px;
border-radius:4px;
">
${word}
</mark>`

);

});

return result;
}

function addStory(){

const input =
document.getElementById(
"storyInput"
);

if(!input.value.trim()) return;

stories.push(input.value);

saveData();

renderStories();

input.value = "";
}

function addPoint(){

const input =
document.getElementById(
"pointInput"
);

if(!input.value.trim()) return;

const match =
stories.some(s =>
s.toLowerCase()
.includes(
input.value.toLowerCase()
)
);

points.push({

text:input.value,

type:
match
? "MATCH"
: "MISMATCH"

});

saveData();

renderPoints();

renderStories();

input.value = "";
}

function addIdea(){

const input =
document.getElementById(
"ideaInput"
);

if(!input.value.trim()) return;

ideas.push(input.value);

saveData();

renderIdeas();

input.value = "";
}

function moveIdeaToStory(index){

stories.push(
ideas[index]
);

ideas.splice(index,1);

saveData();

renderStories();

renderIdeas();
}

function moveIdeaToPoints(index){

const text =
ideas[index];

const match =
stories.some(s =>
s.toLowerCase()
.includes(
text.toLowerCase()
)
);

points.push({

text,

type:
match
? "MATCH"
: "MISMATCH"

});

ideas.splice(index,1);

saveData();

renderPoints();

renderStories();

renderIdeas();
}

function deleteStory(index){

stories.splice(index,1);

saveData();

renderStories();
}

function deletePoint(index){

points.splice(index,1);

saveData();

renderPoints();

renderStories();
}

function deleteIdea(index){

ideas.splice(index,1);

saveData();

renderIdeas();
}

function renderStories(){

const list =
document.getElementById(
"storyList"
);

list.innerHTML = "";

stories.forEach((s,index)=>{

list.innerHTML += `

<div class="item">

<div>
${highlightMatches(s)}
</div>

<button
class="red"
onclick="
deleteStory(${index})
">
Delete
</button>

</div>

`;

});

}

function renderPoints(){

const list =
document.getElementById(
"pointList"
);

list.innerHTML = "";

points.forEach((p,index)=>{

list.innerHTML += `

<div class="item">

${p.text}

<br><br>

<span class="
${
p.type==="MATCH"
? "status-match"
: "status-mismatch"
}
">
${p.type}
</span>

<button
class="red"
onclick="
deletePoint(${index})
">
Delete
</button>

</div>

`;

});

}

function renderIdeas(){

const list =
document.getElementById(
"ideaList"
);

list.innerHTML = "";

ideas.forEach((i,index)=>{

list.innerHTML += `

<div class="item">

${i}

<button
class="blue"
onclick="
moveIdeaToStory(${index})
">
Send To A
</button>

<button
class="green"
onclick="
moveIdeaToPoints(${index})
">
Send To B
</button>

<button
class="red"
onclick="
deleteIdea(${index})
">
Delete
</button>

</div>

`;

});

}

function searchAll(){

const value =
document
.getElementById(
"searchInput"
)
.value
.toLowerCase();

document
.querySelectorAll(".item")
.forEach(item=>{

if(
item.innerText
.toLowerCase()
.includes(value)
){

item.style.display =
"block";

}else{

item.style.display =
"none";

}

});

}

function exportTXT(){

let text =
"=== STORIES ===\n\n";

stories.forEach(s=>{

text +=
s + "\n\n";

});

text +=
"\n=== POINTS ===\n\n";

points.forEach(p=>{

text +=
p.text +
" [" +
p.type +
"]\n";

});

text +=
"\n=== IDEAS ===\n\n";

ideas.forEach(i=>{

text += i + "\n";

});

const blob =
new Blob(
[text],
{type:"text/plain"}
);

const a =
document.createElement("a");

a.href =
URL.createObjectURL(blob);

a.download =
"dynamic-reference-pattern.txt";

a.click();
}

function exportJSON(){

const data = {

stories,
points,
ideas

};

const blob =
new Blob(

[
JSON.stringify(
data,
null,
2
)
],

{
type:
"application/json"
}

);

const a =
document.createElement("a");

a.href =
URL.createObjectURL(blob);

a.download =
"dynamic-reference-pattern.json";

a.click();
}

function startVoice(inputId){

if(
!(
'webkitSpeechRecognition'
in window
)
){

alert(
"Voice recognition not supported"
);

return;
}

const recognition =
new webkitSpeechRecognition();

recognition.lang =
"hi-IN";

recognition.start();

recognition.onresult =
function(event){

const text =

event.results[0][0]
.transcript;

document
.getElementById(inputId)
.value += text;

};

}

renderStories();
renderPoints();
renderIdeas();

</script>

</body>
</html>
